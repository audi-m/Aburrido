<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoApply AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --surface2: #1a1e26;
    --border: #1f2430;
    --green: #00e5a0;
    --green-dim: rgba(0,229,160,0.12);
    --yellow: #ffd166;
    --red: #ff5c5c;
    --text: #e8eaf0;
    --muted: #5a6070;
    --accent: #3b82f6;
  }

  body {
    width: 360px;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: var(--surface);
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo {
    width: 32px; height: 32px;
    background: var(--green);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: #000;
    flex-shrink: 0;
  }
  .header-text h1 {
    font-size: 14px; font-weight: 600; letter-spacing: -0.3px;
    color: var(--text);
  }
  .header-text p {
    font-size: 11px; color: var(--muted); margin-top: 1px;
    font-family: 'Space Mono', monospace;
  }
  .header-actions { margin-left: auto; display: flex; gap: 6px; }
  .icon-btn {
    width: 28px; height: 28px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    color: var(--muted); transition: all 0.15s;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--green); }

  /* Status bar */
  .status-bar {
    background: var(--surface);
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .status-dot.paused { background: var(--yellow); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .status-text { font-size: 12px; color: var(--muted); }
  .status-text span { color: var(--text); font-weight: 500; }
  .platform-badge {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .platform-badge.active { color: var(--green); border-color: var(--green-dim); background: var(--green-dim); }

  /* Stats row */
  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    padding: 12px 14px;
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .stat:last-child { border-right: none; }
  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 20px; font-weight: 700;
    color: var(--green); line-height: 1;
  }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Main toggle */
  .main-control {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .toggle-btn {
    width: 100%; padding: 11px;
    border-radius: 8px; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    letter-spacing: -0.2px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .toggle-btn.start {
    background: var(--green); color: #000;
  }
  .toggle-btn.start:hover { background: #00ffb3; }
  .toggle-btn.stop {
    background: var(--red); color: #fff;
  }
  .toggle-btn.stop:hover { background: #ff7070; }

  /* Platform toggles */
  .platform-row {
    padding: 10px 16px;
    display: flex; gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .plat-toggle {
    flex: 1; padding: 7px 10px;
    border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); cursor: pointer;
    font-size: 12px; font-weight: 500; color: var(--muted);
    transition: all 0.15s; display: flex; align-items: center; gap: 6px;
    justify-content: center;
  }
  .plat-toggle.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .plat-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Settings section */
  .section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .section-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--muted); margin-bottom: 10px;
  }

  .field-row { display: flex; align-items: center; margin-bottom: 8px; }
  .field-row:last-child { margin-bottom: 0; }
  .field-label { font-size: 12px; color: var(--muted); flex: 1; }
  .field-input {
    width: 110px; padding: 5px 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 12px;
    font-family: 'Space Mono', monospace;
    outline: none; transition: border-color 0.15s;
  }
  .field-input:focus { border-color: var(--green); }

  /* API key field */
  .api-field {
    display: flex; gap: 6px; align-items: center;
  }
  .api-input {
    flex: 1; padding: 6px 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 11px;
    font-family: 'Space Mono', monospace; outline: none;
    transition: border-color 0.15s;
  }
  .api-input:focus { border-color: var(--green); }
  .api-input.valid { border-color: var(--green); }
  .api-input.invalid { border-color: var(--red); }
  .save-btn {
    padding: 6px 12px; border-radius: 6px;
    background: var(--accent); border: none;
    color: #fff; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .save-btn:hover { background: #5b9cf6; }
  .save-btn.saved { background: var(--green); color: #000; }

  /* Recent activity */
  .activity-list { max-height: 110px; overflow-y: auto; }
  .activity-list::-webkit-scrollbar { width: 3px; }
  .activity-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .activity-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0; border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-icon { flex-shrink: 0; font-size: 12px; }
  .activity-title { flex: 1; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .activity-co { color: var(--muted); white-space: nowrap; font-size: 10px; }
  .activity-time { color: var(--muted); font-size: 10px; font-family: 'Space Mono', monospace; white-space: nowrap; }

  .empty-state { text-align: center; padding: 16px; color: var(--muted); font-size: 12px; }

  /* Footer */
  .footer {
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-link {
    font-size: 11px; color: var(--muted); cursor: pointer;
    text-decoration: none; transition: color 0.15s;
  }
  .footer-link:hover { color: var(--green); }
  .version { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--border); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">AA</div>
  <div class="header-text">
    <h1>AutoApply AI</h1>
    <p id="currentPage">Not on a job page</p>
  </div>
  <div class="header-actions">
    <div class="icon-btn" id="dashboardBtn" title="Open dashboard">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </div>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <div class="status-text" id="statusText">Idle — <span>waiting</span></div>
  <div class="platform-badge" id="platformBadge">–</div>
</div>

<div class="stats-row">
  <div class="stat">
    <div class="stat-num" id="statToday">0</div>
    <div class="stat-label">Today</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="statTotal">0</div>
    <div class="stat-label">All-Time</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="statRemaining">–</div>
    <div class="stat-label">Remaining</div>
  </div>
</div>

<div class="main-control">
  <button class="toggle-btn start" id="toggleBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
    Start Autopilot
  </button>
</div>

<div class="platform-row">
  <div class="plat-toggle active" id="toggleLinkedIn" data-platform="linkedin">
    <div class="plat-dot"></div> LinkedIn
  </div>
  <div class="plat-toggle active" id="toggleIndeed" data-platform="indeed">
    <div class="plat-dot"></div> Indeed
  </div>
</div>

<div class="section">
  <div class="section-title">Limits</div>
  <div class="field-row">
    <span class="field-label">Daily application limit</span>
    <input type="number" class="field-input" id="dailyLimit" value="40" min="1" max="200">
  </div>
  <div class="field-row">
    <span class="field-label">Min salary ($)</span>
    <input type="number" class="field-input" id="minSalary" value="100000" min="0" step="5000">
  </div>
</div>

<div class="section">
  <div class="section-title">Claude AI API Key</div>
  <div class="api-field">
    <input type="password" class="api-input" id="apiKey" placeholder="sk-ant-api03-...">
    <button class="save-btn" id="saveBtn">Save</button>
  </div>
</div>

<div class="section">
  <div class="section-title">Recent Activity</div>
  <div class="activity-list" id="activityList">
    <div class="empty-state">No applications yet</div>
  </div>
</div>

<div class="footer">
  <a class="footer-link" id="dashboardLink">View Full Dashboard →</a>
  <span class="version">v1.0.0</span>
</div>

<script src="popup.js"></script>
</body>
</html>
