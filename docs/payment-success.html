<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Pro — Aburrido AI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0c0f; color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    padding: 24px;
  }
  .card {
    background: #111318; border: 1px solid #00e5a0; border-radius: 16px;
    padding: 48px 40px; text-align: center; max-width: 420px;
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  p { color: #8892a4; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
  .steps { text-align: left; background: #1a1e26; border-radius: 10px; padding: 16px 20px; margin-bottom: 24px; }
  .steps li { font-size: 13px; margin-bottom: 6px; color: #e2e8f0; }
  .badge {
    display: inline-block; background: #00e5a0; color: #000;
    font-size: 12px; font-weight: 700; padding: 6px 16px; border-radius: 20px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>Welcome to Pro!</h1>
  <p>Your subscription is active. Skills Gap analysis is now unlocked.</p>
  <ol class="steps">
    <li>Go back to the Aburrido AI extension</li>
    <li>Open the Dashboard</li>
    <li>Click "Skills Gap" — it's now unlocked</li>
  </ol>
  <div class="badge">Pro Active</div>
</div>
</body>
</html>
